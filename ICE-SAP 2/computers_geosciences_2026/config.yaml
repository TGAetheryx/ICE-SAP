# ASPT — Computers & Geosciences 2026
# Configuration file

# ── Dataset ───────────────────────────────────────────────────────────────
dataset:
  breidamerkurjokull:
    name: "Breiðamerkurjökull"
    lat: 64.0
    lon: -16.3
    n_scenes: 122
    date_range: ["2019-01-01", "2023-12-31"]
    n_calving_events: 14
    cloud_cover_max: 0.20
    inter_annotator_biou: 0.964
    inter_annotator_biou_std: 0.008
  skeidarárjokull:
    name: "Skeiðarárjökull"
    lat: 64.0558
    lon: -17.2081
    n_scenes: 106
    date_range: ["2019-01-01", "2023-12-31"]
    n_calving_events: 12
    cloud_cover_max: 0.20
    inter_annotator_biou: 0.959
    inter_annotator_biou_std: 0.010
  sentinel2_resolution_m: 10
  n_bands: 6
  band_names: [B2, B3, B4, B11, B12, B10]
  calving_event_threshold_m: 50       # minimum terminus displacement
  calving_event_window_days: 5        # inter-scene interval

# ── Model ─────────────────────────────────────────────────────────────────
model:
  backbone: "unet_mobilenetv2"
  in_channels: 6
  num_classes: 1
  input_size: [512, 512]
  meta_net_variant: "conv"            # MetaNetConv (spatially varying)
  meta_net_hidden_ch: 64
  sigma_meta_min: 4.0                 # px — stable margin (40 m at 10 m/px)
  sigma_meta_max: 10.0                # px — active ablation (100 m at 10 m/px)

# ── Training ──────────────────────────────────────────────────────────────
training:
  stage1_epochs: 50                   # backbone with fixed sigma_meta=1
  stage2_epochs: 30                   # joint Meta-Net + backbone
  optimizer: "adam"
  lr: 1.0e-4
  weight_decay: 1.0e-5
  alpha_bce: 0.5                      # L = α·L_BCE + (1−α)·Σ w(x)·L_focal
  augmentation:
    horizontal_flip: true
    rotation_90: true
    gaussian_noise_std: 0.01
  split: [0.80, 0.10, 0.10]          # train / val / test (scene-stratified by season)
  n_folds: 5

# ── Early-Warning ─────────────────────────────────────────────────────────
early_warning:
  surrogate: "var_Hb"                 # Δ̂_spec = Var[H_b]
  detection_percentile: 5.0           # 5th percentile of rolling baseline
  rolling_window_days: 30             # causal (no future data)
  min_consecutive_obs: 3              # sustained drop criterion
  sentinel2_revisit_hours: 96.0       # ~4-day revisit cadence
  min_lead_time_h: 24                 # ≥24 h for positive detection
  sensitivity_range_pct: [1, 2, 3, 5, 10]   # threshold sensitivity analysis

# ── Evaluation ────────────────────────────────────────────────────────────
evaluation:
  metrics: [boundary_iou, f1, mae_m, lead_time_h, false_alarm_rate, fisher_p]
  pixel_size_m: 10.0
  boundary_width_px: 5                # boundary zone = 50 m
  seg_threshold: 0.5

# ── Edge Deployment ───────────────────────────────────────────────────────
deployment:
  hardware: "raspberry_pi_4"
  quantization: "int8"
  tile_size: 512
  peak_power_mw: 320
  inference_s_per_tile: 2.3
  quantization_biou_loss_pp: 0.8      # 91.0 → 90.2% on-device

# ── Paths (override with absolute paths as needed) ────────────────────────
paths:
  data_dir: "data/"
  checkpoint_dir: "checkpoints/"
  results_dir: "results/"
  figures_dir: "figures/output/"

# ── Reproducibility ───────────────────────────────────────────────────────
seed: 42
