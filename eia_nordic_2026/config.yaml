# ICE-SAP — EIA Nordic 2026
# Configuration file

# ── Dataset ───────────────────────────────────────────────────────────────
dataset:
  n_sites: 56
  n_patches_total: 500000
  primary_site: "Vatnajökull"
  primary_coords: {lat: 64.0, lon: -16.3}
  sensor: "Sentinel-2 + Landsat-8"
  resolution_m: 10
  n_bands: 6
  band_order: [B2, B3, B4, B11, B12, B10]
  patch_size: 256
  train_val_test_split: [76, 20, 26]    # scenes for Vatnajökull
  n_trials: 5
  alpha: 0.05
  site_breakdown:
    polar_continental: 12    # Greenland, Svalbard
    polar_coastal: 8         # Antarctic Peninsula
    sub_polar: 15            # Iceland, Patagonia
    alpine: 16               # Alps, Himalayas, Andes
    tropical: 5              # Papua, Peru

# ── Model ─────────────────────────────────────────────────────────────────
model:
  backbone: "unet_mobilenetv2"
  in_channels: 6
  num_classes: 1
  input_size: [256, 256]

# ── SAP: Sensing-Aware Pruning ────────────────────────────────────────────
sap:
  method: "WSA"                  # Weighted Spatial Activation
  retention_rate: 0.166          # 16.6% channel retention (83.4% compression)
  sigma_meta_range: [4.0, 10.0]  # px — architectural range, §3.1, §3.6, Thm. 2
  entropy_alpha: 0.3
  pareto_cliff_threshold: 0.15   # below 15% → >5 pp drop
  # Robustness: varying σ_meta 4–10 px → IoU ≤0.2 pp, B-IoU ≤0.3 pp

# ── SAAQ: Spectral-Aware Asymmetric Quantization ─────────────────────────
saaq:
  bit_width: 8                   # INT8
  mode: "per_channel_asymmetric"
  calibration_patches: 2000      # Paper §3.3: "2,000 patches, 200 iterations"
  kl_convergence_threshold: 0.005   # KL(P_float‖P_int8) < 0.005 nats
  max_iterations: 200            # Paper §3.3
  spectral_mix:                  # calibration patch composition
    optical: 0.62
    swir: 0.28
    thermal: 0.10
  # Result: 4.9 FPS (4.1× over float32), 1.8 MB deployed, 320 mW, no fine-tuning

# ── SBT+S-ARQ: Semantic Block Transmission ───────────────────────────────
sbt_sarq:
  tile_size: 16                  # px
  tau: 0.5                       # W(x) > τ for transmission
  # S-ARQ (RS coding)
  high_priority_rs_n: 15
  high_priority_rs_k: 9
  high_priority_redundancy: 0.40  # 40%
  high_priority_max_retransmit: 3
  packet_loss_recovery: 0.20     # recovers from 20% packet loss
  rssi_sliding_window: 5         # observations for channel adaptation
  # Result: 18.4 MB → 1.1 MB (93.8% reduction)
  uplink_original_mb: 18.4
  uplink_compressed_mb: 1.1

# ── Meta-Net ─────────────────────────────────────────────────────────────
meta_net:
  variant: "mlp"
  hidden_units: 16
  sigma_min: 4.0
  sigma_max: 10.0                # Paper Thm. 2: [σmin, σmax] = [4, 10] px
  input_features: [ndsi, thermal_mean, glcm_entropy, delta_ndsi]
  overhead_kb: 1.2
  overhead_mw: 2.0
  r2_ablation_width: 0.8        # validated R² > 0.8
  calving_precursor_lag_h: [12, 24]
  calving_precursor_p: 0.01

# ── Cascaded Startup ──────────────────────────────────────────────────────
cascaded_startup:
  L1_ghost:
    power_mw: 15
    frequency_hz: 1.0
    duty_cycle: 0.90
    model_size_kb: 120
    function: "cloud/polar-night detection"
  L2_meta:
    power_mw: 80
    frequency_hz: 0.1
    duty_cycle: 0.08
    function: "Meta-Net sigma_meta generation"
  L3_core:
    power_mw: 320
    frequency_hz: "trigger-based"
    duty_cycle: 0.02
    function: "SAP-compressed inference"
  avg_power_mw: 23.9     # 0.9×15 + 0.08×80 + 0.02×320
  battery_mah: 4000
  battery_life_days: 24.6
  hysteresis:
    L1_L2_theta_up: 0.35
    L1_L2_theta_down: 0.20
    L2_L3_theta_up: 0.50
    L2_L3_theta_down: 0.30
    min_dwell_s: 30

# ── Hardware ──────────────────────────────────────────────────────────────
hardware:
  device: "Raspberry Pi 4"
  ram_gb: 4
  cpu_ghz: 1.5
  runtime: "ONNX Runtime 1.16"
  precision: "INT8"
  peak_power_mw: 320           # +25°C baseline (356 ± 16 mW at −45°C)
  inference_latency_ms: 210    # ± 6 ms, Table 3
  model_size_mb: 1.8           # Table 3: after WSA pruning + SAAQ quantisation
  thermal_range_c: [-45, 13]
  cold_start_cycles: 50

# ── Training ─────────────────────────────────────────────────────────────
training:
  optimizer: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4
  epochs: 100
  lr_schedule: "cosine_annealing"
  gpu: "RTX 3090"

# ── Paths ─────────────────────────────────────────────────────────────────
paths:
  data_dir: "data/"
  checkpoint_dir: "checkpoints/"
  results_dir: "results/"

seed: 42
